<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Primeira Pagina</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <h1>Minha Primeira Pagina v.2</h1>

    <p id="texto">Olá, mundo!</p>

    <button onclick="mudarTexto()">Clique Aqui</button>

    <script>
        function mudarTexto() {
            document.getElementById("texto").innerHTML =
                "Você clicou no botão!";
        }
    </script>

</body>

</html>
