<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas</title>
</head>
<body>
    <h1 id="resultado" style="background-color: rgb(8, 73, 8); color: rgb(255, 255, 255);
     text-align: center ; 
    font-family: Arial, Helvetica, sans-serif; padding: 12px;">Aprovado</h1>
    <script>
    var nota = prompt ("Digite sua nota: ")
    var resultado = document.getElementById("resultado")
    
    if(nota>=60){
resultado.innerText = "APROVADO ! "
resultado.style.backgroundColor = "green"
    }
    else if(nota>=40){
 resultado.innerText = "Recuperação."
 resultado.style.backgroundColor = "orange"
    }
    else{
        resultado.innerText = "REPROVADO :("
        resultado.style.backgroundColor = "red"
    }
    </script>
</body>
</html>
